spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/adventurebook
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration/game
    table: flyway_schema_history_game
    baseline-on-migrate: true
    baseline-version: 0
