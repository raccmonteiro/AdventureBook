services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=adventurebook'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'
  books-web:
    build:
      context: ./books/books-web
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
      - '5004:5004'
    environment:
      - 'JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5004'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/adventurebook'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=postgres'
    depends_on:
      postgres:
        condition: service_healthy
  game-web:
    build:
      context: ./game/game-web
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
      - '5005:5005'
    environment:
      - 'JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/adventurebook'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=postgres'
      - 'SPRING_DATA_REDIS_HOST=redis'
      - 'SPRING_DATA_REDIS_PORT=6379'
      - 'SERVER_PORT=8081'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      books-web:
        condition: service_started
